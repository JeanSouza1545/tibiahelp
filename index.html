<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        const stored = localStorage.getItem('tibiahelp-theme');
        const theme = stored === 'light' || stored === 'dark' ? stored : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/src/Media/TH-Icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TibiaHelp</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
